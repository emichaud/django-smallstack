<style>
  /* ============================================================
     Getting Started — editorial chapter between Home and Search.
     Shares Home's design language exactly: system serif-italic
     display, monospace eyebrows + rule-line section labels,
     hairline dividers, 1px-gap cell grids, staggered page-load
     fades. PALETTE-SAFE: every colour is a CSS variable or a
     color-mix over one — no hex literals, no [data-theme] forks.
     ============================================================ */

  .gs { --gs-hair: color-mix(in srgb, var(--body-fg) 12%, transparent); }

  /* ── Shared editorial primitives (mirror Home's ss-* tokens) ── */
  .gs-eyebrow {
    display: inline-flex; align-items: center; gap: 0.6rem;
    font-family: var(--font-monospace, ui-monospace, SFMono-Regular, Menlo, monospace);
    font-size: 0.78rem; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--body-quiet-color); margin: 0;
  }
  .gs-eyebrow .dot {
    width: 7px; height: 7px; border-radius: 999px;
    background: var(--success-fg);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--success-fg) 22%, transparent);
  }
  .gs-display {
    font-family: ui-serif, "Iowan Old Style", "Apple Garamond", Georgia, Cambria, "Times New Roman", serif;
    font-style: italic; font-weight: 500; line-height: 1.04;
    letter-spacing: -0.02em; margin: 0; color: var(--body-fg);
  }
  .gs-display em {
    font-style: italic; color: var(--primary);
    background: linear-gradient(to bottom,
      transparent 0% 62%,
      color-mix(in srgb, var(--primary) 22%, transparent) 62% 95%,
      transparent 95% 100%);
    padding: 0 0.05em;
  }
  .gs-rule { height: 1px; background: var(--gs-hair); margin: 0; border: none; }
  .gs-section { padding: clamp(2.5rem, 5vw, 3.5rem) 0; }
  .gs-section-label {
    font-family: var(--font-monospace, ui-monospace, Menlo, monospace);
    font-size: 0.74rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--body-quiet-color); margin: 0 0 1.5rem 0;
    display: flex; align-items: center; gap: 12px;
  }
  .gs-section-label::before {
    content: ""; display: inline-block; width: 22px; height: 1px;
    background: currentColor; opacity: 0.5;
  }

  /* ── Hero ────────────────────────────────────────────────── */
  .gs-hero { padding: clamp(2.5rem, 6vw, 4.5rem) 0 clamp(2rem, 4vw, 3rem); }
  .gs-hero h1 { font-size: clamp(2.3rem, 6vw, 4.4rem); margin-top: 1.4rem; }
  .gs-hero-sub {
    max-width: 40rem; margin: 1.5rem 0 2rem 0;
    font-size: clamp(1.02rem, 1.4vw, 1.18rem); line-height: 1.6;
    color: color-mix(in srgb, var(--body-fg) 78%, transparent);
  }
  .gs-hero-sub strong { color: var(--body-fg); font-weight: 600; }
  .gs-cta-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .gs-btn-link {
    color: var(--body-quiet-color); text-decoration: none;
    font-family: var(--font-monospace, ui-monospace, Menlo, monospace);
    font-size: 0.85rem; padding: 0.5rem 0.75rem; transition: color 0.15s;
  }
  .gs-btn-link:hover { color: var(--primary); }
  .gs-btn-link .arrow { transition: transform 0.18s; display: inline-block; }
  .gs-btn-link:hover .arrow { transform: translateX(3px); }

  /* ── The path: numbered steps on a connecting rail ───────── */
  .gs-path { position: relative; }
  .gs-step {
    position: relative;
    display: grid; grid-template-columns: 3.5rem 1fr; gap: 0 1.5rem;
    padding: 1.6rem 0;
    border-top: 1px solid var(--gs-hair);
  }
  .gs-step:first-child { border-top: none; }
  /* connecting rail down the number gutter */
  .gs-step::before {
    content: ""; position: absolute; left: 1.20rem; top: 0; bottom: 0;
    width: 1px; background: var(--gs-hair);
  }
  .gs-step:first-child::before { top: 1.6rem; }
  .gs-step:last-child::before { bottom: calc(100% - 1.6rem - 2.6rem); }
  .gs-step-num {
    position: relative; z-index: 1;
    width: 2.6rem; height: 2.6rem; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-monospace, ui-monospace, Menlo, monospace);
    font-size: 0.82rem; font-weight: 600; letter-spacing: 0.04em;
    color: var(--body-quiet-color);
    background: var(--card-bg);
    border: 1px solid color-mix(in srgb, var(--body-fg) 18%, transparent);
    transition: color 0.18s, border-color 0.18s;
  }
  .gs-step:hover .gs-step-num {
    color: var(--primary);
    border-color: color-mix(in srgb, var(--primary) 55%, transparent);
    background: color-mix(in srgb, var(--primary) 10%, var(--card-bg));
  }
  .gs-step-body { min-width: 0; padding-top: 0.15rem; }
  .gs-step-name {
    font-family: ui-serif, "Iowan Old Style", Georgia, serif;
    font-style: italic; font-weight: 500; font-size: clamp(1.35rem, 2.4vw, 1.7rem);
    line-height: 1.15; margin: 0 0 0.1rem 0; color: var(--body-fg);
  }
  .gs-step-kicker {
    font-family: var(--font-monospace, ui-monospace, Menlo, monospace);
    font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--body-quiet-color); margin: 0 0 0.6rem 0;
  }
  .gs-step-body p { margin: 0 0 0.85rem 0; line-height: 1.62; color: color-mix(in srgb, var(--body-fg) 82%, transparent); max-width: 46rem; }
  .gs-step-body p:last-child { margin-bottom: 0; }
  .gs-step-body code, .gs-inline-code {
    font-family: var(--font-monospace, ui-monospace, Menlo, monospace);
    font-size: 0.85em; color: var(--primary);
    background: color-mix(in srgb, var(--primary) 9%, transparent);
    padding: 0.1em 0.4em; border-radius: 4px;
  }

  /* settings spec list (replaces the old hardcoded-hex code chips) */
  .gs-spec { display: grid; gap: 1px; margin: 0.9rem 0 0.2rem 0;
    background: var(--gs-hair); border: 1px solid var(--gs-hair); border-radius: 8px; overflow: hidden; }
  .gs-spec-row { display: grid; grid-template-columns: minmax(8rem, max-content) 1fr; gap: 0.5rem 1.25rem;
    background: var(--card-bg); padding: 0.6rem 0.9rem; align-items: baseline; }
  .gs-spec-row dt { margin: 0; font-family: var(--font-monospace, ui-monospace, Menlo, monospace);
    font-size: 0.82rem; font-weight: 600; color: var(--primary); }
  .gs-spec-row dd { margin: 0; font-size: 0.86rem; color: var(--body-quiet-color); line-height: 1.45; }
  @media (max-width: 560px) { .gs-spec-row { grid-template-columns: 1fr; gap: 0.1rem; } }

  /* code block (palette-safe; mirrors Home's pipeline card) */
  .gs-code {
    background: color-mix(in srgb, var(--body-fg) 3%, var(--card-bg));
    border: 1px solid var(--gs-hair); border-radius: 10px;
    padding: 1rem 1.2rem; overflow-x: auto; margin: 0.9rem 0 0.2rem 0;
    font-family: var(--font-monospace, ui-monospace, SFMono-Regular, Menlo, "Courier New", monospace);
    font-size: 0.85rem; line-height: 1.6; white-space: pre;
    color: color-mix(in srgb, var(--body-fg) 80%, transparent);
  }
  .gs-code .kw  { color: var(--primary); font-weight: 600; }
  .gs-code .fn  { color: var(--body-fg); font-weight: 600; }
  .gs-code .st  { color: var(--success-fg); }
  .gs-code .num { color: var(--message-warning-bg, orange); }
  .gs-code .cm  { color: var(--body-quiet-color); }

  /* inline doc links under each step */
  .gs-links { display: flex; flex-wrap: wrap; gap: 0.5rem 1.25rem; margin-top: 1rem; }
  .gs-link {
    display: inline-flex; align-items: center; gap: 0.45rem;
    font-family: var(--font-monospace, ui-monospace, Menlo, monospace);
    font-size: 0.8rem; color: var(--body-quiet-color); text-decoration: none;
    transition: color 0.15s;
  }
  .gs-link svg { width: 13px; height: 13px; fill: currentColor; opacity: 0.8; }
  .gs-link .arrow { transition: transform 0.18s; display: inline-block; color: var(--primary); opacity: 0; }
  .gs-link:hover { color: var(--primary); }
  .gs-link:hover .arrow { opacity: 1; transform: translateX(2px); }

  /* ── Build bridge (one model → three surfaces) ───────────── */
  .gs-build { display: grid; grid-template-columns: 1.1fr 1fr; gap: clamp(1.5rem, 4vw, 3rem); align-items: center; }
  @media (max-width: 800px) { .gs-build { grid-template-columns: 1fr; } }
  .gs-build h2 { font-size: clamp(1.7rem, 3.2vw, 2.4rem); margin-bottom: 0.6rem; }
  .gs-build p { color: var(--body-quiet-color); line-height: 1.6; margin: 0 0 1.4rem 0; max-width: 34rem; }
  .gs-surfaces { display: grid; gap: 1px; background: var(--gs-hair);
    border: 1px solid var(--gs-hair); border-radius: 12px; overflow: hidden; }
  .gs-surface { background: var(--card-bg); padding: 1.1rem 1.25rem; display: grid;
    grid-template-columns: max-content 1fr; gap: 0.2rem 1rem; align-items: baseline; }
  .gs-surface-tag {
    font-family: var(--font-monospace, ui-monospace, Menlo, monospace);
    font-size: 0.66rem; letter-spacing: 0.14em; font-weight: 700;
    color: var(--body-quiet-color); align-self: center;
    border: 1px solid var(--gs-hair); border-radius: 4px; padding: 3px 7px;
  }
  .gs-surface-path { grid-column: 2; font-family: var(--font-monospace, ui-monospace, Menlo, monospace);
    font-size: 0.92rem; font-weight: 600; color: var(--primary); margin: 0; }
  .gs-surface-note { grid-column: 2; font-size: 0.82rem; color: var(--body-quiet-color); line-height: 1.5; margin: 0.25rem 0 0 0; }

  /* ── Reference grid (cell grid like Home's batteries) ────── */
  .gs-ref {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
    background: var(--gs-hair); border-top: 1px solid var(--gs-hair); border-bottom: 1px solid var(--gs-hair);
  }
  @media (max-width: 900px) { .gs-ref { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .gs-ref { grid-template-columns: 1fr; } }
  .gs-ref-item {
    background: var(--card-bg); padding: 1.1rem 1.15rem; text-decoration: none;
    color: var(--body-fg); display: flex; flex-direction: column; gap: 0.3rem;
    transition: background 0.15s;
  }
  .gs-ref-item:hover { background: color-mix(in srgb, var(--primary) 7%, var(--card-bg)); }
  .gs-ref-name { font-weight: 600; font-size: 0.96rem; display: flex; align-items: center; gap: 0.5rem; }
  .gs-ref-name svg { width: 15px; height: 15px; fill: var(--primary); flex: 0 0 auto; }
  .gs-ref-note { font-size: 0.8rem; color: var(--body-quiet-color); line-height: 1.5; margin: 0; }

  /* ── Next steps (mirror Home's two-column footer) ────────── */
  .gs-next { display: grid; grid-template-columns: 2fr 1fr; gap: 32px; align-items: start; }
  @media (max-width: 720px) { .gs-next { grid-template-columns: 1fr; } }
  .gs-next-links { display: flex; flex-direction: column; gap: 0.6rem; }
  .gs-next-link {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 0.8rem 0; text-decoration: none; color: var(--body-fg);
    border-bottom: 1px solid color-mix(in srgb, var(--body-fg) 8%, transparent);
    transition: padding 0.15s, color 0.15s;
  }
  .gs-next-link:hover { color: var(--primary); padding-left: 0.4rem; }
  .gs-next-link .ll { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .gs-next-link .ll strong { font-weight: 600; font-size: 1rem; }
  .gs-next-link .ll span { font-size: 0.82rem; color: var(--body-quiet-color); }
  .gs-next-link .arrow { color: var(--body-quiet-color); transition: color 0.15s, transform 0.18s; flex: 0 0 auto; }
  .gs-next-link:hover .arrow { color: var(--primary); transform: translateX(4px); }

  /* search hand-off pill */
  .gs-search-cta {
    display: inline-flex; align-items: center; gap: 0.6rem; margin-top: 1.5rem;
    padding: 0.7rem 1.1rem; text-decoration: none;
    border: 1px solid var(--gs-hair); border-radius: 999px;
    background: color-mix(in srgb, var(--body-fg) 3%, var(--card-bg));
    color: var(--body-fg); font-size: 0.9rem; transition: border-color 0.15s, color 0.15s;
  }
  .gs-search-cta:hover { border-color: color-mix(in srgb, var(--primary) 50%, transparent); color: var(--primary); }
  .gs-search-cta svg { width: 15px; height: 15px; fill: currentColor; }
  .gs-search-cta .arrow { color: var(--body-quiet-color); transition: transform 0.18s, color 0.15s; }
  .gs-search-cta:hover .arrow { color: var(--primary); transform: translateX(3px); }

  /* ── Single page-load orchestration (matches Home) ───────── */
  @keyframes gsFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .gs-fade { animation: gsFade 0.6s ease-out both; }
  .gs-fade.d1 { animation-delay: 0.08s; }
  .gs-fade.d2 { animation-delay: 0.16s; }
  .gs-fade.d3 { animation-delay: 0.24s; }
  .gs-fade.d4 { animation-delay: 0.32s; }
  .gs-fade.d5 { animation-delay: 0.40s; }
  @media (prefers-reduced-motion: reduce) {
    .gs-fade, .gs-fade.d1, .gs-fade.d2, .gs-fade.d3, .gs-fade.d4, .gs-fade.d5 { animation: none; }
  }
  @media (max-width: 480px) {
    .gs-hero h1 { font-size: clamp(2rem, 9vw, 3rem); }
    .gs-step { grid-template-columns: 2.4rem 1fr; gap: 0 1rem; }
    .gs-step::before { left: 1.20rem; }
  }
</style>
