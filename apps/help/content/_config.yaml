# Help System Configuration
# This file defines the navigation structure with section support

title: "Help & Documentation"

# Variables available in markdown files using {{ variable }} syntax
variables:
  version: "0.2.0"
  project_name: "Your Project"
  python_version: "3.12"
  django_version: "6.0"

# Sections configuration
# Each section can have its own folder with pages
sections:
  # Root section (project-specific docs - customize these)
  - slug: ""
    title: "Project Documentation"
    description: "Your project's documentation"
    pages:
      - slug: index
        title: "Welcome"
        description: "Project documentation home"
        icon: "home"

  # SmallStack reference docs (from upstream)
  - slug: smallstack
    title: "SmallStack Reference"
    description: "Django SmallStack documentation"
    folder: smallstack/
    config: smallstack/_config.yaml
