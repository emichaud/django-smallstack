# Gunicorn configuration for smallstack
# Kamal proxy connects to app_port (8000) defined in deploy.yml

bind = "0.0.0.0:8000"
workers = 2
threads = 4
worker_class = "sync"
worker_tmp_dir = "/dev/shm"
timeout = 120
keepalive = 5

# Logging
accesslog = "-"
errorlog = "-"
loglevel = "info"

# Process naming
proc_name = "smallstack"

# Disable gunicorn's control socket (gunicorn 25+). Nothing in the stack talks
# to it, and the Docker image's `app` user has no home directory, so the arbiter
# logs "Control server error: [Errno 13] Permission denied: '/home/app'" on
# every boot. Turning it off removes that noise.
control_socket_disable = True
