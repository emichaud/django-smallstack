# Gunicorn configuration for admin_starter
# Kamal proxy expects the app to run on port 80

bind = "0.0.0.0:80"
workers = 2
threads = 4
worker_class = "sync"
worker_tmp_dir = "/dev/shm"
timeout = 120
keepalive = 5

# Logging
accesslog = "-"
errorlog = "-"
loglevel = "info"

# Process naming
proc_name = "admin_starter"
