<svg xmlns="http://www.w3.org/2000/svg" width="420" height="100" viewBox="0 0 420 100">
  <!-- Icon: Stacked layers -->
  <g transform="translate(10, 10)">
    <!-- Bottom layer (lightest) -->
    <path d="M10 65 L40 80 L70 65 L70 55 L40 70 L10 55 Z" fill="#4FD1A5"/>
    <!-- Middle layer -->
    <path d="M10 50 L40 65 L70 50 L70 40 L40 55 L10 40 Z" fill="#2BA977"/>
    <!-- Top layer -->
    <path d="M10 35 L40 50 L70 35 L70 25 L40 40 L10 25 Z" fill="#1A6B4A"/>
    <!-- Top surface -->
    <path d="M40 10 L10 25 L40 40 L70 25 Z" fill="#4FD1A5"/>
  </g>

  <!-- Text: Django SmallStack (light colors for dark background) -->
  <text x="95" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36">
    <tspan fill="#FFFFFF" font-weight="600">Django</tspan>
    <tspan fill="#FFFFFF" font-weight="300"> Small</tspan><tspan fill="#4FD1A5" font-weight="600">Stack</tspan>
  </text>
</svg>
