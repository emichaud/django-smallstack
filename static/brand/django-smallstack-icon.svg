<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Three stacked layers with offset - optimized for small display -->
  <!-- Bottom layer (lightest) -->
  <rect x="6" y="32" width="30" height="8" rx="4" fill="#4FD1A5"/>
  <!-- Middle layer -->
  <rect x="10" y="22" width="30" height="8" rx="4" fill="#2BA977"/>
  <!-- Top layer (darkest) -->
  <rect x="14" y="12" width="30" height="8" rx="4" fill="#0C4B33"/>
</svg>
