[project]
name = "django-smallstack"
version = "0.13.5"
description = "A minimal Django stack for building and deploying admin-style apps"
requires-python = ">=3.12"
dependencies = [
    "django>=6.0",
    "python-decouple>=3.8",
    "pillow>=10.0",
    "gunicorn>=21.0",
    "whitenoise>=6.6",
    "django-extensions>=3.2",
    "django-debug-toolbar>=4.2",
    "markdown>=3.5",
    "pyyaml>=6.0",
    "django-tasks-db>=0.2",
    "django-htmx>=1.19",
    "django-axes>=7.0",
    "django-csp>=4.0",
    "tablib>=3.9.0",
    "django-filter>=25.2",
    "django-cors-headers>=4.9.0",
    "mcp>=1.27",
]

[project.scripts]
# `rb` — shorthand for `manage.py runbook` (finds manage.py by walking up, keeps stdin piping).
rb = "apps.runbook.shim:main"
# `sc` — SmallStack framework CLI: `manage.py sc <verb>` over the CRUDView registry + ops verbs.
sc = "apps.smallstack.shim:main"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-django>=4.5",
    "pytest-cov>=4.0",
    "ruff>=0.1",
    "openapi-spec-validator>=0.7",
]
# PostgreSQL driver — install with `uv sync --extra postgres` (or --all-extras)
# when running SmallStack on Postgres. SQLite (the default) needs nothing here.
postgres = [
    "psycopg[binary]>=3.1",
]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.per-file-ignores]
"*/migrations/*.py" = ["E501"]  # Migrations are auto-generated

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
python_files = ["test_*.py", "*_test.py", "tests.py"]
testpaths = ["apps"]
addopts = "--ds=config.settings.test --cov=apps --cov-report=term-missing:skip-covered --cov-report=html"
filterwarnings = [
    "ignore:SMALLSTACK_TOPBAR_NAV_ITEMS:DeprecationWarning",
]
markers = [
    "starter_content: tests that assert upstream starter *copy/pages* (legal text, marketing/home, signup) a downstream replaces or disables — safe to skip downstream. Do NOT tag framework chrome (breadcrumbs, topbar nav) that downstream keeps.",
]

[tool.coverage.run]
source = ["apps"]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/tests.py",
    "*/test_*.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
]
show_missing = true
skip_covered = true

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["apps*", "config*"]

[tool.uv]
package = true

