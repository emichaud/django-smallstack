# Kamal deployment configuration for opshugger
# Reference: https://kamal-deploy.org/docs/configuration
# Target VPS: 107.170.48.56

service: opshugger

# Docker image name
image: opshugger

# Production server(s)
servers:
  web:
    - 107.170.48.56

# SSH configuration
ssh:
  user: root

# Persistent volumes for data and media
volumes:
  - /root/opshugger_data/media:/app/media
  - /root/opshugger_data/db:/app/data

# Environment variables
env:
  clear:
    DJANGO_SETTINGS_MODULE: config.settings.production
    DJANGO_DEBUG: "False"
  secret:
    - SECRET_KEY
    - ALLOWED_HOSTS
    - CSRF_TRUSTED_ORIGINS

# Kamal proxy configuration
proxy:
  ssl: true
  hosts:
    - opshugger.com
    - www.opshugger.com
  healthcheck:
    path: /health/
    interval: 10
    timeout: 60

# Local Docker registry (Kamal manages SSH port forwarding)
registry:
  server: localhost:5555

# Builder configuration
builder:
  arch: amd64
