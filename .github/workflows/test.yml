name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: sqlite
            test_db: ""
          - label: postgres
            test_db: postgres
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DB: ${{ matrix.test_db }}
      TEST_DB_HOST: localhost
      TEST_DB_PORT: "5432"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - name: Sync deps (incl. postgres extra)
        run: uv sync --all-extras
      - name: Run tests
        run: uv run pytest -q --no-cov

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - name: Sync deps
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check .
