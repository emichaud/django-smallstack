<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 Server Error</title>
    <script>
    (function() {
        try {
            var theme = localStorage.getItem('smallstack-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            var palette = localStorage.getItem('smallstack-palette');
            if (palette && palette !== 'django') {
                document.documentElement.setAttribute('data-palette', palette);
            }
        } catch(e) {}
    })();
    </script>
    <style>
        /* Error pages are intentionally standalone (so they render even
           if theme.css fails to load — especially important at 500). The
           variable set mirrors the modern-dark theme; per-palette
           overrides keep the accent in sync with whatever the user picked. */
        :root {
            --bg: #131722;
            --text: #ffffff;
            --quiet: #9ca3af;
            --accent: #a855f7;
            --card-bg: #161b22;
            --border: #2a2f3a;
        }
        html[data-palette="django"]        { --accent: #10b981; }
        html[data-palette="dark-blue"]     { --accent: #3b82f6; }
        html[data-palette="orange"]        { --accent: #f97316; }
        html[data-palette="high-contrast"] { --accent: #ffffff; }
        [data-theme="light"] {
            --bg: #f5f5f5;
            --text: #1f2937;
            --quiet: #6b7280;
            --card-bg: #ffffff;
            --border: #e5e7eb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-page { text-align: center; max-width: 480px; padding: 2rem; }
        .error-code { font-size: 6rem; font-weight: 700; line-height: 1; color: var(--accent); opacity: 0.85; }
        .error-title { font-size: 1.5rem; font-weight: 600; margin: 0.5rem 0; }
        .error-message { color: var(--quiet); margin: 1rem 0 2rem; line-height: 1.6; }
        .error-home { display: inline-block; padding: 0.6rem 1.5rem; background: var(--accent); color: var(--bg); text-decoration: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600; transition: opacity 0.2s; }
        .error-home:hover { opacity: 0.85; }
        .error-divider { width: 60px; height: 3px; background: var(--accent); margin: 1.5rem auto; opacity: 0.4; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">500</div>
        <h1 class="error-title">Server Error</h1>
        <div class="error-divider"></div>
        <p class="error-message">Something went wrong on our end. The issue has been logged and we'll look into it. Try refreshing the page or come back later.</p>
        <a href="/" class="error-home">Go Home</a>
    </div>
</body>
</html>
