{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset | SmallStack</title>
    <link rel="stylesheet" href="{% static 'admin/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Reset Password</h1>
                <p>Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <form method="post" class="auth-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_email">Email Address</label>
                    <input type="email" name="email" id="id_email" class="vTextField" autofocus autocomplete="email" required>
                    {% if form.email.errors %}
                    <ul class="errorlist">
                        {% for error in form.email.errors %}
                        <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                    {% endif %}
                </div>
                <button type="submit" class="button button-primary">Send Reset Link</button>
            </form>

            <div class="auth-footer-links">
                <a href="{% url 'login' %}">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="{% static 'js/theme.js' %}"></script>
</body>
</html>
