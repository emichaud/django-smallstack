{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out | {{ brand.name }}</title>
    <link rel="stylesheet" href="{% static 'admin/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'smallstack/css/theme.css' %}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Logged Out</h1>
                <p>You have been successfully logged out.</p>
            </div>

            <div class="auth-footer-links">
                <a href="{% url 'login' %}" class="button button-primary" style="display: inline-block; margin-bottom: 16px;">Log In Again</a>
                <a href="{% url 'website:home' %}">Return to Home</a>
            </div>
        </div>
    </div>

    <script src="{% static 'smallstack/js/theme.js' %}"></script>
</body>
</html>
