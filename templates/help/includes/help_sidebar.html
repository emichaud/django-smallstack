{% load theme_tags %}
<div class="help-sidebar-inner">
    <div class="help-search-wrapper">
        <input type="text"
               id="help-search"
               class="help-search-input"
               placeholder="Search docs..."
               autocomplete="off">
        <div id="help-search-results" class="help-search-results"></div>
    </div>

    <nav class="help-nav">
        <ul class="help-nav-list">
            {% for p in all_pages %}
            <li class="help-nav-item">
                <a href="{% url 'help:detail' p.slug %}"
                   class="help-nav-link {% if p.slug == page.slug %}active{% endif %}">
                    {{ p.title }}
                </a>
            </li>
            {% endfor %}
        </ul>
    </nav>

    <div class="help-sidebar-footer">
        <a href="{% url 'help:index' %}" class="help-back-link">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            All Documentation
        </a>
    </div>
</div>
