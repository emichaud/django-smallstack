{% load static theme_tags %}
<header class="topbar">
    <div class="topbar-left">
        <!-- Mobile menu toggle -->
        <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
            </svg>
        </button>

        <!-- Site logo/name -->
        <a href="{% url 'website:home' %}" class="site-logo">
            <img src="{% static brand.icon %}" alt="{{ brand.name }}" class="logo-icon" width="24" height="24">
            <span class="logo-text">{{ brand.name }}</span>
        </a>
    </div>

    <div class="topbar-right">
        <!-- Dark/Light mode toggle -->
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
            <svg class="sun-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
            </svg>
        </button>

        <!-- User menu -->
        {% if user.is_authenticated %}
        <div class="user-menu">
            <button class="user-menu-toggle" id="user-menu-toggle" type="button" aria-label="User menu">
                {% if user.profile.profile_photo %}
                <img src="{{ user.profile.profile_photo.url }}" alt="{{ user.username }}" class="user-avatar-img">
                {% else %}
                <span class="user-avatar">
                    {{ user.username|slice:":1"|upper }}
                </span>
                {% endif %}
                <span class="user-name">{{ user.username }}</span>
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path d="M7 10l5 5 5-5z"/>
                </svg>
            </button>
            <div class="user-dropdown" id="user-dropdown">
                {% if user.profile.background_photo %}
                <div class="dropdown-header-bg" style="background-image: url('{{ user.profile.background_photo.url }}');"></div>
                {% endif %}
                <a href="{% url 'profile' %}" class="dropdown-item">Profile</a>
                {% if user.is_staff %}
                <a href="{% url 'admin:index' %}" class="dropdown-item">Admin</a>
                {% endif %}
                <hr class="dropdown-divider">
                <form method="post" action="{% url 'logout' %}" class="dropdown-logout-form">
                    {% csrf_token %}
                    <button type="submit" class="dropdown-item dropdown-logout-btn">Logout</button>
                </form>
            </div>
        </div>
        {% else %}
        <div class="auth-links">
            <a href="{% url 'login' %}" class="auth-link btn-outline">Login</a>
            <a href="{% url 'signup' %}" class="auth-link btn-primary">Sign Up</a>
        </div>
        {% endif %}
    </div>
</header>
